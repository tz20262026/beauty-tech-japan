name: 毎日3記事自動投稿

on:
  workflow_dispatch:        # 手動実行ボタン（auto-post.yml が自動実行を担当）

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: コードを取得
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Pythonセットアップ
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.12'

      - name: 依存関係インストール
        run: pip install google-genai

      - name: 記事生成
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/post_one_article.py

      - name: 画像ファイルが実際にコミット対象か検証
        id: verify_image
        run: |
          set +e
          python scripts/verify_latest_image.py
          echo "verify_exit=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: 画像異常をIssueで通知
        if: steps.verify_image.outputs.verify_exit != '0'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          VERIFY_MESSAGE: ${{ steps.verify_image.outputs.verify_message }}
          VERIFY_EXIT: ${{ steps.verify_image.outputs.verify_exit }}
        run: |
          BODY="${VERIFY_MESSAGE}

          verify_exit=1（エラー）: 画像がコミットされずブロックされました。原因調査が必要です。
          verify_exit=2（警告）: Gemini画像生成が失敗し記事本文のみ公開されました。scripts/backfill_images.py で後から補完してください。"
          gh issue create \
            --title "🖼️ 記事画像に問題発生（$(date '+%Y-%m-%d')・code=${VERIFY_EXIT}）" \
            --body "$BODY"

      - name: GitHubにプッシュ（Vercelが自動デプロイ）
        if: steps.verify_image.outputs.verify_exit != '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/extra_articles.json scripts/data/posted_ids.log public/images/articles/
          git diff --cached --quiet && echo "変更なし" || git commit -m "記事追加: $(date '+%Y-%m-%d %H:%M JST')"
          git push

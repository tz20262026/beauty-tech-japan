name: 毎日3記事自動投稿

on:
  schedule:
    - cron: '0 22 * * *'   # 日本時間 7:00 (UTC 22:00)
    - cron: '0 0 * * *'    # 日本時間 9:00 (UTC 0:00)
    - cron: '0 3 * * *'    # 日本時間 12:00 (UTC 3:00)
  workflow_dispatch:        # 手動実行ボタン

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: コードを取得
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Pythonセットアップ
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.12'

      - name: 依存関係インストール
        run: pip install google-genai

      - name: 記事生成
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/post_one_article.py

      - name: GitHubにプッシュ（Vercelが自動デプロイ）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/extra_articles.json scripts/data/posted_ids.log public/images/articles/
          git diff --cached --quiet && echo "変更なし" || git commit -m "記事追加: $(date '+%Y-%m-%d %H:%M JST')"
          git push

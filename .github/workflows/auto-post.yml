name: 美容記事 自動投稿

on:
  schedule:
    # 2日おき JST 9:00（UTC 0:00）に実行
    - cron: '0 0 */2 * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  post-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 必要なライブラリをインストール
        run: pip install google-generativeai google-genai

      - name: 記事を生成・追加
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/post_one_article.py

      - name: 画像ファイルが実際にコミット対象か検証
        id: verify_image
        run: |
          set +e
          python scripts/verify_latest_image.py
          echo "verify_exit=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: 画像異常をIssueで通知
        if: steps.verify_image.outputs.verify_exit != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERIFY_MESSAGE: ${{ steps.verify_image.outputs.verify_message }}
          VERIFY_EXIT: ${{ steps.verify_image.outputs.verify_exit }}
        run: |
          BODY="${VERIFY_MESSAGE}

          verify_exit=1（エラー）: 画像がコミットされずブロックされました。原因調査が必要です。
          verify_exit=2（警告）: Gemini画像生成が失敗し記事本文のみ公開されました。scripts/backfill_images.py で後から補完してください。"
          gh issue create \
            --title "🖼️ 記事画像に問題発生（$(date '+%Y-%m-%d')・code=${VERIFY_EXIT}）" \
            --body "$BODY"

      - name: 変更をコミット＆プッシュ
        if: steps.verify_image.outputs.verify_exit != '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/extra_articles.json scripts/data/posted_ids.log public/images/articles/
          git diff --staged --quiet || git commit -m "auto: 美容記事＋専用画像を1件自動追加 [skip ci]"
          git push

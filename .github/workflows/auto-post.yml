name: 美容記事 自動投稿

on:
  schedule:
    # 毎日 JST 9:00（UTC 0:00）に実行
    - cron: '0 0 * * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  post-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 必要なライブラリをインストール
        run: pip install google-generativeai google-genai

      - name: 記事を生成・追加
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/post_one_article.py

      - name: 変更をコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/extra_articles.json scripts/data/posted_ids.log public/images/articles/
          git diff --staged --quiet || git commit -m "auto: 美容記事＋専用画像を1件自動追加 [skip ci]"
          git push
